    # ─── Knowledge Base Schemas ─────────────────────────────

    CreateKnowledgeBaseRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 255
        description:
          type: string
        documentType:
          type: string
        source:
          type: string
        language:
          type: string
        syncTarget:
          type: string
          enum: [postgres, s3-bedrock]
          default: postgres
        syncTargetConfig:
          type: object
          properties:
            bucket:
              type: string
            region:
              type: string
            prefix:
              type: string
            bedrockKbId:
              type: string
            bedrockDataSourceId:
              type: string

    UpdateKnowledgeBaseRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 255
        description:
          type: string
        documentType:
          type: string
        source:
          type: string
        language:
          type: string
        isActive:
          type: boolean
        syncTarget:
          type: string
          enum: [postgres, s3-bedrock]
        syncTargetConfig:
          type: object
          properties:
            bucket:
              type: string
            region:
              type: string
            prefix:
              type: string
            bedrockKbId:
              type: string
            bedrockDataSourceId:
              type: string

    CreateDocumentRequest:
      type: object
      required: [fileName, content]
      properties:
        fileName:
          type: string
          minLength: 1
          maxLength: 255
        content:
          type: string
          minLength: 1
        mimeType:
          type: string
          default: text/plain

    UpdateDocumentRequest:
      type: object
      properties:
        fileName:
          type: string
          minLength: 1
          maxLength: 255
        content:
          type: string
          minLength: 1
        mimeType:
          type: string

    SyncKnowledgeBaseRequest:
      type: object
      required: [sourceType, sourceConfig]
      properties:
        sourceType:
          type: string
          minLength: 1
          maxLength: 50
        sourceConfig:
          type: object
          additionalProperties: true
        dryRun:
          type: boolean
          default: false
        forceFullSync:
          type: boolean
          default: false
        batchSize:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100

