openapi: 3.0.3
info:
  title: DatiHub Backend API
  description: |
    REST API for the DatiHub conversational chatbot platform.

    Base path: `/api`

    ## ⚠️ DEPRECATED
    Este archivo está deprecado. La especificación oficial de la API ahora se encuentra en:
    **`src/shared/swagger/swagger.json`**

    Este archivo se mantiene solo por compatibilidad legacy y será eliminado en futuras versiones.
  version: 2.0.0
  deprecated: true
  contact:
    name: DatiHub Backend Team
  license:
    name: ISC
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.tudominio.com
    description: Production server

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/auth/register:
