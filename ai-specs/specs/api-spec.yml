components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: Operation completed successfully
        data:
          $ref: "#/components/schemas/GenericObject"
      required:
        - success
        - statusCode
        - message
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
        errorCode:
          type: string
          example: validation-failed
        devMessage:
          type: string
          nullable: true
        filePath:
          type: string
          nullable: true
        isOperational:
          type: boolean
          nullable: true
      required:
        - success
        - statusCode
        - message
        - errorCode
    GenericObject:
      type: object
      additionalProperties: true
    PaginationMeta:
      type: object
      properties:
        totalPages:
          type: integer
          example: 3
        currentPage:
          type: integer
          example: 1
        prevPage:
          type: boolean
          example: false
        nextPage:
          type: boolean
          example: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    RegisterRequest:
          AuthUser:
            type: object
            properties:
              id:
                type: string
              email:
                type: string
                format: email
              name:
                type: string
              role:
                type: string
          AuthSession:
            type: object
            properties:
              token:
                type: string
              expiresAt:
                type: string
                format: date-time
          AuthLoginData:
            type: object
            properties:
              user:
                $ref: "#/components/schemas/AuthUser"
              session:
                $ref: "#/components/schemas/AuthSession"
          AuthLoginResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthLoginData"
          AuthRegisterResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthUser"
          AuthProfileResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthUser"
          FlowStep:
            type: object
            properties:
              id:
                type: string
              stepIndex:
                type: integer
              type:
                type: string
                enum: [text, input, options, template, ai, file_upload, multiple_choice, number, date, confirmation]
              content:
                type: string
              validationType:
                type: string
                nullable: true
              isRequired:
                type: boolean
              options:
                type: array
                items:
                  $ref: "#/components/schemas/GenericObject"
              imageUrl:
                type: string
                format: uri
                nullable: true
          Flow:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
                nullable: true
              isActive:
                type: boolean
              isAutoResponse:
                type: boolean
              steps:
                type: array
                items:
                  $ref: "#/components/schemas/FlowStep"
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
          FlowListResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Flow"
          FlowResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Flow"
      type: object
      required: [email, password, name, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        name:
          type: string
        role:
          type: string
    FlowRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        isAutoResponse:
          type: boolean
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FlowStep"
        agentId:
          type: string
          description: "ID del agente Bedrock directo (sin supervisor)"
        agentAliasId:
          type: string
          description: "Alias ID del agente Bedrock directo"
        supervisorAgentId:
          type: string
          maxLength: 255
          description: "ID del agente Bedrock que actúa como router multi-agente"
          example: "ABCD1234EF"
        supervisorAgentAliasId:
          type: string
          maxLength: 255
          description: "Alias ID del agente supervisor Bedrock"
          example: "TSTALIASID"
        subAgentsConfig:
          type: object
          description: "Mapa de sub-agentes: nombre → { agentId, agentAliasId }"
          additionalProperties:
            type: object
            required: [agentId, agentAliasId]
            properties:
              agentId:
                type: string
              agentAliasId:
                type: string
          example:
            julie:
              agentId: "JULIE_AGENT_ID"
              agentAliasId: "JULIE_ALIAS_ID"
      required:
        - name
        UsersUploadResponse:
          allOf:
            - $ref: "#/components/schemas/SuccessResponse"
            - type: object
              properties:
                data:
                  type: object
                  properties:
                    total:
                      type: integer
                    inserted:
                      type: integer
                    skipped:
                      type: integer
                    errors:
                      type: array
                      items:
                        $ref: "#/components/schemas/GenericObject"
    WebhookRequest:
          Webhook:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              url:
                type: string
                format: uri
              events:
                type: array
                items:
                  type: string
              isActive:
                type: boolean
              status:
                type: string
              retryAttempts:
                type: integer
              timeout:
                type: integer
              headers:
                $ref: "#/components/schemas/GenericObject"
              successCount:
                type: integer
              failureCount:
                type: integer
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
          WebhookLog:
            type: object
            properties:
              id:
                type: string
              event:
                type: string
              payload:
                $ref: "#/components/schemas/GenericObject"
              response:
                $ref: "#/components/schemas/GenericObject"
              statusCode:
                type: integer
              success:
                type: boolean
              attempt:
                type: integer
              duration:
                type: integer
              triggeredAt:
                type: string
                format: date-time
          WebhookEvent:
            type: object
            properties:
              value:
                type: string
              description:
                type: string
          WebhookResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Webhook"
          WebhookListResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
          WebhookEventListResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebhookEvent"
          WebhookLogListResponse:
            allOf:
              - $ref: "#/components/schemas/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebhookLog"
